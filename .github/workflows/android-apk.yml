name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - "android-apk/**"
      - "android-apk-6000/**"
      - "index.html"
      - "eng6000/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Copy latest web app into Android assets
        shell: bash
        run: cp index.html android-apk/app/src/main/assets/index.html

      - name: Copy latest 6000 web app into Android assets
        shell: bash
        run: cp eng6000/index.html android-apk-6000/app/src/main/assets/index.html

      - name: Build 2000 debug APK
        working-directory: android-apk
        run: gradle :app:assembleDebug

      - name: Build 6000 debug APK
        working-directory: android-apk-6000
        run: gradle :app:assembleDebug

      - name: Upload 2000 APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eng2000-wordking-debug-apk
          path: android-apk/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload 6000 APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eng6000-wordking-debug-apk
          path: android-apk-6000/app/build/outputs/apk/debug/app-debug.apk
